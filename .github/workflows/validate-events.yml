name: Validate events.json

on:
  pull_request:
    paths:
      - 'data/events.json'
      - 'scripts/validate-events.mjs'
  push:
    paths:
      - 'data/events.json'
      - 'scripts/validate-events.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate events
        run: npm run validate:events

